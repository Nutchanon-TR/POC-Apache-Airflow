x-airflow-build: &airflow-build
  build:
    context: .
    dockerfile: Dockerfile
  image: annotation-airflow:local
  user: "${AIRFLOW_UID:-50000}:0"

x-airflow-env: &airflow-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__FERNET_KEY: ""
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"

x-ct1-airflow: &ct1-airflow
  <<: *airflow-build
  env_file:
    - ../.env
  environment:
    <<: *airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@ct1-postgres/airflow
    AIRFLOW__WEBSERVER__SESSION_COOKIE_NAME: ct1_session
    AIRFLOW__WEBSERVER__SECRET_KEY: ct1-secret-key-crossserver
    CT1_OUTPUT_DIR: /opt/airflow/shared/ct1-out
    CT2_DAG_ID: ct2_pipeline
    CT2_INPUT_PATH: /opt/airflow/shared/ct2-in/mock.txt
    WORKER_API_URL: http://ct2-worker-api:9092
    REQUEST_TIMEOUT_SECONDS: "30"
    AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
    AZURE_BLOB_CONTAINER: ${AZURE_BLOB_CONTAINER:-crossserver-files}
  volumes:
    - ./Annotation-CrossServer/CT1.py:/opt/airflow/dags/CT1.py
    - ./config/ct1_webserver_config.py:/opt/airflow/webserver_config.py
    - ./data/ct1-out:/opt/airflow/shared/ct1-out
    - ct1ann-logs:/opt/airflow/logs
    - ct1ann-plugins:/opt/airflow/plugins

x-ct2-airflow: &ct2-airflow
  <<: *airflow-build
  environment:
    <<: *airflow-env
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@ct2-postgres/airflow
    AIRFLOW__WEBSERVER__SESSION_COOKIE_NAME: ct2_session
    AIRFLOW__WEBSERVER__SECRET_KEY: ct2-secret-key-crossserver
    CT1_DEFAULT_SOURCE_PATH: /opt/airflow/shared/ct1-out/Mock_latest.txt
    CT2_INPUT_PATH: /opt/airflow/shared/ct2-in/mock.txt
    CT2_REVERSED_OUTPUT_PATH: /opt/airflow/shared/ct2-out/mock_reversed.txt
    WORKER_BATCH_URL: http://worker-batch:9091
    REQUEST_TIMEOUT_SECONDS: "30"
  volumes:
    - ./Annotation-CrossServer/CT2.py:/opt/airflow/dags/CT2.py
    - ./config/ct2_webserver_config.py:/opt/airflow/webserver_config.py
    - ./data/ct1-out:/opt/airflow/shared/ct1-out:ro
    - ./data/ct2-in:/opt/airflow/shared/ct2-in
    - ./data/ct2-out:/opt/airflow/shared/ct2-out
    - ct2ann-logs:/opt/airflow/logs
    - ct2ann-plugins:/opt/airflow/plugins

services:
  # ── Postgres ────────────────────────────────────────────────────────────────
  ct1-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ct1ann-postgres-db:/var/lib/postgresql/data
    restart: unless-stopped

  ct2-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ct2ann-postgres-db:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Airflow init ─────────────────────────────────────────────────────────────
  ct1-init:
    <<: *ct1-airflow
    command:
      - bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username "${CT1_AIRFLOW_USER:-airflow}" \
          --password "${CT1_AIRFLOW_PASSWORD:-airflow}" \
          --firstname "CT1" --lastname "Admin" \
          --role "Admin" --email "ct1@example.local" || true
    depends_on:
      ct1-postgres:
        condition: service_healthy

  ct2-init:
    <<: *ct2-airflow
    command:
      - bash
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username "${CT2_AIRFLOW_USER:-airflow}" \
          --password "${CT2_AIRFLOW_PASSWORD:-airflow}" \
          --firstname "CT2" --lastname "Admin" \
          --role "Admin" --email "ct2@example.local" || true
    depends_on:
      ct2-postgres:
        condition: service_healthy

  # ── CT1 Airflow ──────────────────────────────────────────────────────────────
  ct1-webserver:
    <<: *ct1-airflow
    command: webserver
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      ct1-postgres:
        condition: service_healthy
      ct1-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ct1-scheduler:
    <<: *ct1-airflow
    command: scheduler
    depends_on:
      ct1-postgres:
        condition: service_healthy
      ct1-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── CT2 Airflow ──────────────────────────────────────────────────────────────
  ct2-webserver:
    <<: *ct2-airflow
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      ct2-postgres:
        condition: service_healthy
      ct2-init:
        condition: service_completed_successfully
    restart: unless-stopped

  ct2-scheduler:
    <<: *ct2-airflow
    command: scheduler
    depends_on:
      ct2-postgres:
        condition: service_healthy
      ct2-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Worker/API – CT1 side (external clients trigger CT1 through this) ─────────
  ct1-worker-api:
    build:
      context: ./Worker/API
    image: annotation-worker-api:local
    ports:
      - "9090:9090"
    environment:
      SERVER_PORT: "9090"
      AIRFLOW_BASE_URL: http://ct1-webserver:8080
      AIRFLOW_USERNAME: ${CT1_AIRFLOW_USER:-airflow}
      AIRFLOW_PASSWORD: ${CT1_AIRFLOW_PASSWORD:-airflow}
      AIRFLOW_DEFAULT_DAG_ID: ct1_pipeline
    depends_on:
      ct1-webserver:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker/API – CT2 side (CT1 DAG triggers CT2 through this) ────────────────
  ct2-worker-api:
    image: annotation-worker-api:local
    ports:
      - "9092:9092"
    environment:
      SERVER_PORT: "9092"
      AIRFLOW_BASE_URL: http://ct2-webserver:8080
      AIRFLOW_USERNAME: ${CT2_AIRFLOW_USER:-airflow}
      AIRFLOW_PASSWORD: ${CT2_AIRFLOW_PASSWORD:-airflow}
      AIRFLOW_DEFAULT_DAG_ID: ct2_pipeline
    depends_on:
      ct1-worker-api:
        condition: service_started
      ct2-webserver:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker/Batch (CT2 DAG delegates text reversal here) ──────────────────────
  worker-batch:
    build:
      context: ./Worker/Batch
    image: annotation-worker-batch:local
    ports:
      - "9091:9091"
    environment:
      SERVER_PORT: "9091"
      REVERSE_INPUT_PATH: /opt/airflow/shared/ct2-in/mock.txt
      REVERSE_OUTPUT_PATH: /opt/airflow/shared/ct2-out/mock_reversed.txt
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_BLOB_CONTAINER: ${AZURE_BLOB_CONTAINER:-crossserver-files}
    volumes:
      - ./data/ct2-in:/opt/airflow/shared/ct2-in
      - ./data/ct2-out:/opt/airflow/shared/ct2-out
    restart: unless-stopped

volumes:
  ct1ann-postgres-db:
  ct2ann-postgres-db:
  ct1ann-logs:
  ct2ann-logs:
  ct1ann-plugins:
  ct2ann-plugins:
